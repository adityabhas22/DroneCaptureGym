[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dronecaptureops-gym"
version = "0.1.0"
description = "OpenEnv-compatible aerial inspection environment for high-level drone capture operations"
requires-python = ">=3.11"
dependencies = [
  "openenv-core>=0.2.3",
  "pydantic>=2.10",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]
train = [
  "accelerate>=1.10",
  "datasets>=4.0",
  "peft>=0.17",
  "trl>=0.23.1",
]

[project.scripts]
dronecaptureops-server = "server.app:main"

[tool.setuptools.packages.find]
include = ["dronecaptureops*", "server*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
