# GRPO fast H200 — sized to fit a 1-hour HF Job end-to-end.
#
# Phase budget (target):
#   - image + pip install: ~5-8 min
#   - base model + SFT LoRA load: ~1-2 min
#   - training loop (20 steps): <= 45 min
#   - save adapter + push to hub: ~1-2 min
#
# Per-step budget assumes group-batched generate (batch=group_size) + SDPA:
#   - calls/step = prompts_per_step * max_episode_steps = 4 * 4 = 16
#   - each batched generate (G=8 prompts, 128 new tokens) ~3-5s on H200 bf16
#   - rollout: 50-80s, update: 20-30s, total ~80-110s per step
#   - 20 steps -> 27-37 min, leaving headroom inside the 45-min budget.

model_name: Qwen/Qwen3-4B-Instruct-2507
tokenizer_name: null
sft_checkpoint: adityabhaskara/dronecaptureops-sft-qwen3-4b:last-checkpoint
allow_fresh_lora: false
output_dir: artifacts/grpo-fast-4b-h200/checkpoints

max_prompt_length: 2048
max_total_length: 8192
pad_to_multiple_of: 8

grpo_epochs: 1
minibatch_size: 1
micro_batch_size: 1
total_steps: 20
save_interval_steps: 10
log_interval_steps: 1

lora:
  rank: 64
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

optimizer:
  actor_lr: 5.0e-6
  weight_decay: 0.0
  betas: [0.9, 0.95]
  max_grad_norm: 1.0
  warmup_steps: 0
  scheduler: cosine

algorithm:
  eps_clip_low: 0.2
  eps_clip_high: 0.2
  kl_coef: 0.005
  kl_estimator: k3
  entropy_coef: 0.001
  adv_eps: 1.0e-4
  clip_advantage: true
  advantage_clip: 5.0

rollout:
  prompts_per_step: 4
  group_size: 8
  temperature: 0.9
  top_p: 1.0
  max_new_tokens_per_turn: 128
  max_episode_steps: 4
  max_history_steps: 1

eval:
  enabled: false
  interval_steps: 10
  held_out_tasks: []
  seeds_per_task: 1
  max_episode_steps: 4

reporting:
  enabled: true
  rollouts_jsonl: rollouts/rollouts.jsonl
  reports_dir: reports
  traces_dir: traces
  max_trace_samples_per_step: 2
  include_messages: false

train_tasks:
  - basic_thermal_survey
  - anomaly_confirmation
  - pid_multi_row_pattern
  - multi_anomaly_triage
seed: 4242

wandb_project: dronecaptureops-grpo
wandb_run_name: fast-4b-h200
wandb_mode: disabled
