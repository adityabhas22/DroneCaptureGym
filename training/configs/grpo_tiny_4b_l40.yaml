# GRPO tiny learning run — first multi-step run after smoke gate.
#
# Memory profile is tighter than the PPO L40S config because GRPO
# eliminates vLLM colocation and the value head:
#   - ~17 GB freed by removing vLLM
#   - one fewer forward+backward (no critic loss)
#   - no critic warmup (was the L40S OOM site)
# The trainer scores the same bounded generation window used during rollout,
# with short no-think completions so assistant spans fit reliably.

model_name: Qwen/Qwen3-4B-Instruct-2507
tokenizer_name: null
sft_checkpoint: adityabhaskara/dronecaptureops-sft-qwen3-4b:last-checkpoint
allow_fresh_lora: false
output_dir: artifacts/grpo-tiny-4b/checkpoints

max_prompt_length: 2048
max_total_length: 8192
pad_to_multiple_of: 8

grpo_epochs: 1
minibatch_size: 1
micro_batch_size: 1
total_steps: 10
save_interval_steps: 5
log_interval_steps: 1

lora:
  rank: 64
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

optimizer:
  actor_lr: 5.0e-6
  weight_decay: 0.0
  betas: [0.9, 0.95]
  max_grad_norm: 1.0
  warmup_steps: 0
  scheduler: cosine

algorithm:
  eps_clip_low: 0.2
  eps_clip_high: 0.2
  kl_coef: 0.01
  kl_estimator: k3
  entropy_coef: 0.001
  adv_eps: 1.0e-4
  clip_advantage: true
  advantage_clip: 5.0

rollout:
  prompts_per_step: 4
  group_size: 4
  temperature: 0.9
  top_p: 1.0
  max_new_tokens_per_turn: 160
  max_episode_steps: 6
  max_history_steps: 1

eval:
  enabled: false
  interval_steps: 5
  held_out_tasks: []
  seeds_per_task: 1
  max_episode_steps: 6

reporting:
  enabled: true
  rollouts_jsonl: rollouts/rollouts.jsonl
  reports_dir: reports
  traces_dir: traces
  max_trace_samples_per_step: 2
  include_messages: false

train_tasks:
  - basic_thermal_survey
  - anomaly_confirmation
  - pid_multi_row_pattern
  - multi_anomaly_triage
seed: 4242

wandb_project: dronecaptureops-grpo
wandb_run_name: tiny-learning-4b-l40
wandb_mode: disabled
