# SFT data generation config — default settings.
#
# Adding a new task to dronecaptureops/tasks/solar_tasks.SOLAR_TASKS
# automatically pulls it into the dataset (via include_tasks: null below).
# To exclude tasks or override per-task knobs, edit `tasks:` here.

# Where to write the JSONL.
output: artifacts/sft/sft-warmstart.jsonl

# How many seeds to run per task. Each seed produces (potentially) one
# example per policy listed below. 15 is calibrated for the trainer's
# val_seed_fraction=0.20 — that yields ~3 val seeds per task, enough for
# stable val_loss measurement while leaving ~12 seeds in train.
seeds_per_task: 15

# Per-rollout cap. Enough headroom for the full SOLAR_TASKS catalog;
# task-spec-level max_steps overrides this for tight-budget tasks.
max_steps: 40

# Policies that produce trajectories. Oracle is canonical; adding
# `scripted` injects an alternative successful path for tasks both can
# solve, increasing strategy diversity without adding noise (require_success
# below filters out failed scripted runs).
policies:
  - name: task_oracle
    weight: 1
  - name: scripted
    weight: 1

# Task selection.
# - `include_tasks: null` ⇒ every task in SOLAR_TASKS is included.
# - `include_tasks: [task_a, task_b]` ⇒ only those tasks.
# - `exclude_tasks` always wins.
#
# We list the oracle-solvable subset explicitly. The other 25 tasks in
# SOLAR_TASKS exist but the legacy oracle can't solve them; leaving them
# out of SFT keeps the corpus clean (require_success would filter them
# anyway, but explicit > implicit). Those tasks are reached via PPO
# exploration. Rationale: docs/sft-task-coverage.md.
include_tasks:
  - basic_thermal_survey
  - anomaly_confirmation
  - low_battery_inspection
  - multi_anomaly_triage
  - no_anomaly_clearance
  - obstacle_detour_inspection
  - privacy_zone_capture
  - thermal_only_anomaly_skip_rgb
  - pid_multi_row_pattern
  - diode_fault_needs_close_thermal
  - bird_soiling_explanation
  - vegetation_edge_encroachment
  - substation_adjacency_caution
  - true_false_anomaly_discrimination
  - no_defect_with_glare_artifact
  - audit_grade_strict_grounding
  - warranty_claim_evidence_pack
  - glare_angle_experiment
  - multi_issue_one_rgb_context
  - commissioning_acceptance_survey
exclude_tasks: []

# Per-task overrides. Optional, sparse, additive on top of the global
# settings above. Only the keys you provide override the defaults.
tasks: []
# Example overrides:
# tasks:
#   - task_id: limited_steps_rapid_survey
#     max_steps: 16
#   - task_id: privacy_zone_capture
#     seeds_per_task: 4   # fewer seeds — trajectory shape is repetitive
#   - task_id: multi_anomaly_triage
#     policies:
#       - name: task_oracle
#         weight: 2       # double sample this task

# Data hygiene.
require_success: true            # only keep complete=True trajectories
deduplicate: true                # drop exact-duplicate trajectories
use_tool_calls: false            # JSON-text format (broader model support)
shuffle: true                    # shuffle output order so SFT epochs don't see tasks in blocks
shuffle_seed: 1                  # reproducible shuffling

# Held-out tasks (NEVER include in the training set even if they appear in
# include_tasks). Each holds out a *related but distinct* train task so
# the model sees the broader mechanic axis without same-task leakage:
#   - multi_anomaly_triage     ↔ multi_issue_one_rgb_context (both train multi-anomaly)
#   - audit_grade_strict_grounding ↔ warranty_claim_evidence_pack (both train strict grounding)
#   - obstacle_detour_inspection ↔ substation_adjacency_caution (both train airspace mechanics)
#   - glare_angle_experiment   ↔ true_false_anomaly_discrimination (both train false-positive)
held_out_tasks:
  - multi_anomaly_triage
  - audit_grade_strict_grounding
  - obstacle_detour_inspection
  - glare_angle_experiment
