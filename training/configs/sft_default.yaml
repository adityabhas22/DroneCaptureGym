# SFT data generation config — default settings.
#
# Adding a new task to dronecaptureops/tasks/solar_tasks.SOLAR_TASKS
# automatically pulls it into the dataset (via include_tasks: null below).
# To exclude tasks or override per-task knobs, edit `tasks:` here.

# Where to write the JSONL.
output: artifacts/sft/sft-warmstart.jsonl

# How many seeds to run per task. Each seed produces (potentially) one
# example per policy listed below. 15 is calibrated for the trainer's
# val_seed_fraction=0.20 — that yields ~3 val seeds per task, enough for
# stable val_loss measurement while leaving ~12 seeds in train.
seeds_per_task: 12

# Per-rollout cap. Enough headroom for the full SOLAR_TASKS catalog;
# task-spec-level max_steps overrides this for tight-budget tasks.
max_steps: 40

# Policies that produce trajectories.
#
# `spec_aware_scripted` is the all-45-task solver in
# `examples/run_task_suite.py`. It reads from each task's SolarTaskSpec
# (required_rows, extra_zones, obstacle_schedule, defect weights) and is
# verified to complete every task at all seeds tested. This is the
# canonical reference for SFT.
#
# We don't add a second policy here. With 45 distinct tasks × 12 seeds
# the dataset already has substantial mechanic-level diversity; adding a
# second policy that produces a different *strategy* for the same task
# helps less than it would on a smaller task set. The legacy `task_oracle`
# only solves ~20 of 45 and would shrink coverage; `scripted` is a generic
# heuristic and would mostly fail under `require_success`.
policies:
  - name: spec_aware_scripted
    weight: 1

# Task selection.
# - `include_tasks: null` ⇒ every task in SOLAR_TASKS is included.
# - `include_tasks: [task_a, task_b]` ⇒ only those tasks.
# - `exclude_tasks` always wins.
#
# null = all 45 tasks. The spec-aware solver covers the full catalog so we
# no longer need to whitelist a subset (and shouldn't — the goal is for
# SFT to see the full mechanic distribution so RL can refine, not
# discover, every category).
include_tasks: null
exclude_tasks: []

# Per-task overrides. Optional, sparse, additive on top of the global
# settings above. Only the keys you provide override the defaults.
tasks: []
# Example overrides:
# tasks:
#   - task_id: limited_steps_rapid_survey
#     max_steps: 16
#   - task_id: privacy_zone_capture
#     seeds_per_task: 4   # fewer seeds — trajectory shape is repetitive
#   - task_id: multi_anomaly_triage
#     policies:
#       - name: task_oracle
#         weight: 2       # double sample this task

# Data hygiene.
require_success: true            # only keep complete=True trajectories
deduplicate: true                # drop exact-duplicate trajectories
use_tool_calls: false            # JSON-text format (broader model support)
shuffle: true                    # shuffle output order so SFT epochs don't see tasks in blocks
shuffle_seed: 1                  # reproducible shuffling

# Held-out tasks (NEVER trained on; written to a separate eval JSONL).
# Picked to span the seven mechanic families introduced in the v2 suite,
# one task per family, so cross-task generalisation gets one example each:
#   1. dynamic-obstacle scheduling → scheduled_crane_window_wait_or_detour
#   2. honest partial reports     → honest_partial_report_open_items
#   3. severity-weighted triage   → strict_severity_weighted_triage
#   4. tight-quality framing      → edge_row_quality_bar
#   5. privacy-safe alternates    → privacy_safe_alternate_evidence
#   6. return-margin decisions    → return_margin_decision_point
#   7. route-replan with extra VPs → route_replan_when_primary_viewpoint_blocked
held_out_tasks:
  - scheduled_crane_window_wait_or_detour
  - honest_partial_report_open_items
  - strict_severity_weighted_triage
  - edge_row_quality_bar
  - privacy_safe_alternate_evidence
  - return_margin_decision_point
  - route_replan_when_primary_viewpoint_blocked
