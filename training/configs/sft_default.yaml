# SFT data generation config — default settings.
#
# Adding a new task to dronecaptureops/tasks/solar_tasks.SOLAR_TASKS
# automatically pulls it into the dataset (via include_tasks: null below).
# To exclude tasks or override per-task knobs, edit `tasks:` here.

# Where to write the JSONL.
output: artifacts/sft/sft-warmstart.jsonl

# How many seeds to run per task. Each seed produces (potentially) one
# example per policy listed below. 15 is calibrated for the trainer's
# val_seed_fraction=0.20 — that yields ~3 val seeds per task, enough for
# stable val_loss measurement while leaving ~12 seeds in train.
seeds_per_task: 12

# Per-rollout cap. Enough headroom for the full SOLAR_TASKS catalog;
# task-spec-level max_steps overrides this for tight-budget tasks.
max_steps: 40

# Policies that produce trajectories.
#
# Three strategy variants of the spec-aware solver — they all solve every
# task in SOLAR_TASKS but take different paths:
#   s0 (careful)     — get_mission_checklist, severity-weighted RGB,
#                       inspect_capture interleaved, baseline summary text.
#   s1 (streamlined) — skip warm-up checklist, row-position RGB ordering,
#                       compact ops-log summary.
#   s2 (diagnostic)  — checklist + list_assets, severity-weighted RGB,
#                       estimate_return_margin before return, narrative
#                       summary.
# Listing all three triples the unique action-sequence count per task and
# trains the model that valid solutions vary in tool subset, ordering, and
# summary phrasing — defeating task_id → fixed-sequence shortcut learning.
policies:
  - name: spec_aware_scripted_s0
    weight: 1
  - name: spec_aware_scripted_s1
    weight: 1
  - name: spec_aware_scripted_s2
    weight: 1
  # s3 (recovery-aware): like s0 PLUS injects ONE failure-recovery cycle.
  # Currently demonstrates: set_gimbal(pitch=-120) → env error
  # `invalid_gimbal_pitch:-120.0` → drone state unchanged → set_gimbal at
  # valid pitch → continue normally. Trains the model to read `obs.error`
  # and emit a corrective action. Skipped on tight-budget tasks.
  - name: spec_aware_scripted_s3
    weight: 1

# Task selection.
# - `include_tasks: null` ⇒ every task in SOLAR_TASKS is included.
# - `include_tasks: [task_a, task_b]` ⇒ only those tasks.
# - `exclude_tasks` always wins.
#
# null = all 45 tasks. The spec-aware solver covers the full catalog so we
# no longer need to whitelist a subset (and shouldn't — the goal is for
# SFT to see the full mechanic distribution so RL can refine, not
# discover, every category).
include_tasks: null
exclude_tasks: []

# Per-task overrides. Optional, sparse, additive on top of the global
# settings above. Only the keys you provide override the defaults.
tasks: []
# Example overrides:
# tasks:
#   - task_id: limited_steps_rapid_survey
#     max_steps: 16
#   - task_id: privacy_zone_capture
#     seeds_per_task: 4   # fewer seeds — trajectory shape is repetitive
#   - task_id: multi_anomaly_triage
#     policies:
#       - name: task_oracle
#         weight: 2       # double sample this task

# Data hygiene.
require_success: true            # only keep complete=True trajectories
deduplicate: true                # drop exact-duplicate trajectories
use_tool_calls: false            # JSON-text format (broader model support)
shuffle: true                    # shuffle output order so SFT epochs don't see tasks in blocks
shuffle_seed: 1                  # reproducible shuffling

# Held-out tasks (NEVER trained on; written to a separate eval JSONL).
# Picked to span six mechanic families, one task each, so cross-task
# generalisation eval has at least one example per axis:
#   1. honest partial reports     → honest_partial_report_open_items
#   2. severity-weighted triage   → strict_severity_weighted_triage
#   3. tight-quality framing      → edge_row_quality_bar
#   4. privacy-safe alternates    → privacy_safe_alternate_evidence
#   5. return-margin decisions    → return_margin_decision_point
#   6. route-replan with extra VPs → route_replan_when_primary_viewpoint_blocked
#
# `scheduled_crane_window_wait_or_detour` is the ONLY task in the suite with
# an `obstacle_schedule` (time-windowed obstacle), so we keep it in train —
# without it the model never sees the `hover` wait-strategy demonstration.
# Held-out coverage of "dynamic-obstacle scheduling" is omitted as a
# deliberate trade-off; the alternative (no hover anywhere) is worse.
held_out_tasks:
  - honest_partial_report_open_items
  - strict_severity_weighted_triage
  - edge_row_quality_bar
  - privacy_safe_alternate_evidence
  - return_margin_decision_point
  - route_replan_when_primary_viewpoint_blocked
